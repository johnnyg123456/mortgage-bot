<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mortgage Bot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      padding: 48px 32px;
      max-width: 640px;
    }
    .badge {
      display: inline-block;
      background: #1e3a5f;
      border: 1px solid #3b82f6;
      color: #93c5fd;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 999px;
      margin-bottom: 24px;
    }
    h1 {
      font-size: 48px;
      font-weight: 800;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 16px;
    }
    p {
      color: #94a3b8;
      font-size: 18px;
      line-height: 1.6;
      margin-bottom: 40px;
    }
    .endpoints {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 24px;
      text-align: left;
      margin-bottom: 32px;
    }
    .endpoints h2 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #64748b;
      margin-bottom: 16px;
    }
    .endpoint {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid #1e293b;
    }
    .endpoint:last-child { border-bottom: none; }
    .method {
      font-size: 11px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 4px;
      min-width: 44px;
      text-align: center;
    }
    .method.post { background: #422006; color: #fb923c; border: 1px solid #c2410c; }
    .method.get  { background: #052e16; color: #4ade80; border: 1px solid #15803d; }
    .path { font-family: 'Courier New', monospace; font-size: 14px; color: #e2e8f0; }
    .status-row {
      display: flex;
      justify-content: center;
      gap: 24px;
    }
    .status-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 8px #22c55e;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .status-label { font-size: 12px; color: #64748b; }
  </style>
</head>
<body>
  <div class="container">
    <div class="badge">v1.0.0</div>
    <h1>Mortgage Bot</h1>
    <p>Automated mortgage pipeline — monitors Gmail, syncs Notion, and receives Arive status updates.</p>

    <div class="endpoints">
      <h2>Active Endpoints</h2>
      <div class="endpoint">
        <span class="method post">POST</span>
        <span class="path">/api/arive-webhook</span>
      </div>
      <div class="endpoint">
        <span class="method get">GET</span>
        <span class="path">/api/gmail-watch</span>
      </div>
      <div class="endpoint">
        <span class="method get">GET</span>
        <span class="path">/health</span>
      </div>
    </div>

    <div class="status-row">
      <div class="status-item">
        <div class="dot"></div>
        <span class="status-label">Server Online</span>
      </div>
    </div>
  </div>
</body>
</html>
